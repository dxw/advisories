version: "3"

volumes:
  mysql_data_dxw-security:

services:
  mailcatcher:
    image: schickling/mailcatcher
    ports:
      - "127.0.0.1:1080:1080"
      - "[::1]:1080:1080"

  beanstalk:
    image: schickling/beanstalkd
    ports:
      - "127.0.0.1:11300:11300"
      - "[::1]:11300:11300"

  beanstalkd_console:
    image: schickling/beanstalkd-console
    ports:
      - "127.0.0.1:2080:80"
      - "[::1]:2080:80"
    environment:
      BEANSTALKD_HOST: beanstalk
      BEANSTALKD_PORT: 11300

  mysql:
    image: mariadb:10
    ports:
      - "127.0.0.1:3306:3306"
      - "[::1]:3306:3306"
    volumes:
      - mysql_data_dxw-security:/var/lib/mysql
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_ROOT_PASSWORD: foobar

  wordpress:
    image: thedxw/wpc-wordpress:php8.2
    ports:
      - "127.0.0.1:80:80"
      - "[::1]:80:80"
    links:
      - mysql
      - mailcatcher
      - beanstalk
    volumes:
      - .:/usr/src/app
      - ./wp-content:/var/www/html/wp-content
